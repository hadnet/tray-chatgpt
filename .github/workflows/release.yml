name: Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to rebuild installers for"
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    name: Prepare release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Create or update release PR
        id: release
        uses: googleapis/release-please-action@v4
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  resolve-release:
    name: Resolve release tag
    needs: release-please
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.release-please.outputs.release_created == 'true') }}
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Select release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag_name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${{ needs.release-please.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

  build-installers:
    name: Build ${{ matrix.platform }} x64 installer
    needs: resolve-release
    if: ${{ always() && needs.resolve-release.outputs.tag_name != '' }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-13
          - platform: Linux
            os: ubuntu-22.04
          - platform: Windows
            os: windows-2022

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install Linux package dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm libsecret-1-dev

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Electron installers
        run: yarn make --arch=x64

      - name: Upload installers to release
        uses: softprops/action-gh-release@v2
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          tag_name: ${{ needs.resolve-release.outputs.tag_name }}
          files: out/make/**/*
          overwrite_files: true
